<!DOCTYPE html>
<html>
<head>
    <title>Vitamin Reviews</title>
</head>
<body>

<h2>Vitamin Reviews</h2>

<a href="{% url 'pages:submit_rating' %}">Add a Review</a>

<hr>

{% for review in reviews %}
    <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
        <strong>{{ review.vitamin_name }}</strong><br>
        Rating: {{ review.rating }} ⭐<br>
        <p>{{ review.review_text }}</p>
        <small>{{ review.created_at }}</small>
    </div>
{% empty %}
    <p>No reviews yet.</p>
{% endfor %}

</body>
</html>
