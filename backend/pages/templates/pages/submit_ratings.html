{% extends "layout.html" %}

{% block title %}Submit a Vitamin Review{% endblock %}

{% block content %}
<header class="page-header">
    <h1>Submit a Vitamin Review</h1>
    <p class="page-header__lead">For supplements not in the main catalog.</p>
</header>

<div class="card" style="max-width: 640px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-row">
            <button type="submit" class="btn">Submit review</button>
            <a href="{% url 'pages:vitamin_reviews' %}" class="btn btn--ghost">Back to reviews</a>
        </div>
    </form>
</div>
{% endblock %}
