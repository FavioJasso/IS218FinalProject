{% extends "layout.html" %}

{% block title %}Review {{ product.product_name }}{% endblock %}

{% block content %}
<header class="page-header">
    <h1>Review {{ product.product_name }}</h1>
    <p class="page-header__lead">Share your honest experience &mdash; ratings help other shoppers.</p>
</header>

<div class="card" style="max-width: 640px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="btn-row">
            <button type="submit" class="btn">Submit review</button>
            <a href="{% url 'accounts:item_info' product.pk %}" class="btn btn--ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
